name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

env:
  TERM: xterm
  COLORTERM: truecolor
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libswscale-dev

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Build notcurses
        run: |
          mkdir -p resources/lib
          cd vendor/notcurses
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MULTIMEDIA=ffmpeg \
            -DBUILD_FFI_LIBRARY=ON \
            -DUSE_CXX=OFF \
            -DBUILD_EXECUTABLES=OFF \
            -DUSE_PANDOC=OFF \
            -DUSE_DOCTEST=OFF \
            -DUSE_POC=OFF \
            -DUSE_STATIC=OFF
          make -j$(nproc)
          cd ../../..
          for lib in libnotcurses libnotcurses-core libnotcurses-ffi; do
            found=$(find vendor/notcurses/build -name "${lib}.so*" -type f | head -1)
            if [ -n "$found" ]; then
              cp "$found" "resources/lib/${lib}.so"
              echo "Staged ${lib}.so"
            fi
          done
          touch resources/lib/libnotcurses.dylib resources/lib/libnotcurses-core.dylib resources/lib/libnotcurses-ffi.dylib
          touch resources/lib/libnotcurses.dll resources/lib/libnotcurses-core.dll resources/lib/libnotcurses-ffi.dll

      - name: Install Raku dependencies
        run: |
          zef install --/test --test-depends --deps-only .
      - name: Run tests
        run: prove -e 'raku -I lib -I t/lib' --verbose t/*.rakutest

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          brew install \
            cmake \
            pkg-config \
            ffmpeg \
            ncurses \
            libunistring \
            libdeflate

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Build notcurses
        run: |
          mkdir -p resources/lib
          BREW_PREFIX=$(brew --prefix)
          cd vendor/notcurses
          mkdir -p build && cd build
          PKG_CONFIG_PATH="${BREW_PREFIX}/opt/ncurses/lib/pkgconfig:${PKG_CONFIG_PATH}" \
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MULTIMEDIA=ffmpeg \
            -DBUILD_FFI_LIBRARY=ON \
            -DUSE_CXX=OFF \
            -DBUILD_EXECUTABLES=OFF \
            -DUSE_PANDOC=OFF \
            -DUSE_DOCTEST=OFF \
            -DUSE_POC=OFF \
            -DUSE_STATIC=OFF
          make -j$(sysctl -n hw.ncpu)
          cd ../../..
          for lib in libnotcurses libnotcurses-core libnotcurses-ffi; do
            found=$(find vendor/notcurses/build -name "${lib}*.dylib" -type f | sort | tail -1)
            if [ -n "$found" ]; then
              cp "$found" "resources/lib/${lib}.dylib"
              echo "Staged ${lib}.dylib"
            fi
          done
          touch resources/lib/libnotcurses.so resources/lib/libnotcurses-core.so resources/lib/libnotcurses-ffi.so
          touch resources/lib/libnotcurses.dll resources/lib/libnotcurses-core.dll resources/lib/libnotcurses-ffi.dll

      - name: Install Raku dependencies
        run: |
          zef install --/test --test-depends --deps-only .
      - name: Run tests
        run: prove -e 'raku -I lib -I t/lib' --verbose t/*.rakutest

  # Windows CI disabled — notcurses 3.0.16 has unguarded struct termios
  # references in termdesc.c that fail with current MSYS2 GCC (15.2).
  # Upstream notcurses CI has the same issue (their tests are also disabled).
  # Re-enable when upstream patches Windows support or we vendor a fix.

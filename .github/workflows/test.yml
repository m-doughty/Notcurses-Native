name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

env:
  TERM: xterm
  COLORTERM: truecolor
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libswscale-dev

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Build notcurses
        run: |
          mkdir -p resources/lib
          cd vendor/notcurses
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MULTIMEDIA=ffmpeg \
            -DBUILD_FFI_LIBRARY=ON \
            -DUSE_CXX=OFF \
            -DBUILD_EXECUTABLES=OFF \
            -DUSE_PANDOC=OFF \
            -DUSE_DOCTEST=OFF \
            -DUSE_POC=OFF \
            -DUSE_STATIC=OFF
          make -j$(nproc)
          cd ../../..
          for lib in libnotcurses libnotcurses-core libnotcurses-ffi; do
            found=$(find vendor/notcurses/build -name "${lib}.so*" -type f | head -1)
            if [ -n "$found" ]; then
              cp "$found" "resources/lib/${lib}.so"
              echo "Staged ${lib}.so"
            fi
          done
          touch resources/lib/libnotcurses.dylib resources/lib/libnotcurses-core.dylib resources/lib/libnotcurses-ffi.dylib
          touch resources/lib/libnotcurses.dll resources/lib/libnotcurses-core.dll resources/lib/libnotcurses-ffi.dll

      - name: Install Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      - name: Run unit tests (prove6)
        run: |
          zef install --/test App::Prove6
          prove6 --verbose -I lib -I t/lib t

      - name: Run extended tests (prove — terminal-dependent)
        run: prove -e 'raku -I lib -I t/lib' --verbose xt/*.rakutest

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          brew install \
            cmake \
            pkg-config \
            ffmpeg \
            ncurses \
            libunistring \
            libdeflate

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Build notcurses
        run: |
          mkdir -p resources/lib
          BREW_PREFIX=$(brew --prefix)
          cd vendor/notcurses
          mkdir -p build && cd build
          PKG_CONFIG_PATH="${BREW_PREFIX}/opt/ncurses/lib/pkgconfig:${PKG_CONFIG_PATH}" \
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MULTIMEDIA=ffmpeg \
            -DBUILD_FFI_LIBRARY=ON \
            -DUSE_CXX=OFF \
            -DBUILD_EXECUTABLES=OFF \
            -DUSE_PANDOC=OFF \
            -DUSE_DOCTEST=OFF \
            -DUSE_POC=OFF \
            -DUSE_STATIC=OFF
          make -j$(sysctl -n hw.ncpu)
          cd ../../..
          for lib in libnotcurses libnotcurses-core libnotcurses-ffi; do
            found=$(find vendor/notcurses/build -name "${lib}*.dylib" -type f | sort | tail -1)
            if [ -n "$found" ]; then
              cp "$found" "resources/lib/${lib}.dylib"
              echo "Staged ${lib}.dylib"
            fi
          done
          touch resources/lib/libnotcurses.so resources/lib/libnotcurses-core.so resources/lib/libnotcurses-ffi.so
          touch resources/lib/libnotcurses.dll resources/lib/libnotcurses-core.dll resources/lib/libnotcurses-ffi.dll

      - name: Install Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      - name: Run unit tests (prove6)
        run: |
          zef install --/test App::Prove6
          prove6 --verbose -I lib -I t/lib t

      - name: Run extended tests (prove — terminal-dependent)
        run: prove -e 'raku -I lib -I t/lib' --verbose xt/*.rakutest

  test-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Rakudo first so msys2 (below) can inherit PATH including raku/zef.
      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      # MSYS2 in UCRT64 mode — produces native Windows DLLs/EXEs built
      # with mingw-w64 GCC. Per upstream notcurses docs this is the only
      # supported Windows build environment.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # Inherit the Windows PATH so Raku/setup-raku's rakudo + zef
          # are visible inside the msys2 shell. Without this the msys2
          # environment is sandboxed from the runner's PATH entries.
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-libunistring
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain

      # Windows build uses ffmpeg for multimedia. Upstream notcurses docs
      # recommend OpenImageIO on Windows, but MSYS2 ships only the latest
      # OIIO which has ABI drift vs notcurses 3.0.17's oiio.cpp. ffmpeg's
      # media path is the same well-tested one used on Linux/macOS. No
      # pandoc, no doctest (notcurses-tester doesn't build on Windows),
      # no static (we want a DLL).
      - name: Build notcurses
        run: |
          mkdir -p resources/lib
          cd vendor/notcurses
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MULTIMEDIA=ffmpeg \
            -DBUILD_FFI_LIBRARY=ON \
            -DUSE_CXX=OFF \
            -DBUILD_EXECUTABLES=OFF \
            -DUSE_PANDOC=OFF \
            -DUSE_DOCTEST=OFF \
            -DUSE_POC=OFF \
            -DUSE_STATIC=OFF
          ninja
          cd ../../..
          # Stage built DLLs into resources/lib as *.dll. Names vary
          # slightly under mingw (usually libfoo-N.dll or foo.dll).
          for lib in notcurses notcurses-core notcurses-ffi; do
            found=$(find vendor/notcurses/build -iname "*${lib}*.dll" -type f | head -1)
            if [ -n "$found" ]; then
              cp "$found" "resources/lib/lib${lib}.dll"
              echo "Staged lib${lib}.dll"
            fi
          done
          # Placeholder files for the other platforms' suffixes so
          # META6's install pass doesn't choke on missing artefacts.
          touch resources/lib/libnotcurses.dylib \
                resources/lib/libnotcurses-core.dylib \
                resources/lib/libnotcurses-ffi.dylib
          touch resources/lib/libnotcurses.so \
                resources/lib/libnotcurses-core.so \
                resources/lib/libnotcurses-ffi.so

      # Upstream explicitly notes that notcurses-tester does not work on
      # Windows (see doc/notcurses.md, 'Microsoft Windows' section).
      # Our goal is to prove the build, install, and load path works —
      # not to run the full unit-test suite here. A successful build +
      # zef install with --/test demonstrates the artifact is usable.
      - name: Verify zef can install the module
        run: zef install --/test .

name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

env:
  TERM: xterm
  COLORTERM: truecolor
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      # ---------------------------------------------------------
      # Prebuilt path — run BEFORE installing system deps so the
      # bundle is exercised with no system notcurses present.
      # Proves the staged libs are fully self-contained.
      # ---------------------------------------------------------
      - name: Install Notcurses::Native via prebuilt path
        run: zef install --/test .

      - name: Install Raku test deps
        run: zef install --/test App::Prove6

      - name: Run unit tests (prove6) — prebuilt path
        run: prove6 --verbose -I lib -I t/lib t

      - name: Run extended tests (prove — terminal-dependent)
        run: prove -e 'raku -I lib -I t/lib' --verbose xt/*.rakutest

      # ---------------------------------------------------------
      # Source-build path — needs system deps (cmake + dev headers)
      # for the CMake fallback. Install them now, after the prebuilt
      # pass has already validated the self-contained bundle.
      # ---------------------------------------------------------
      - name: Install system dependencies (for source-build fallback)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libswscale-dev

      - name: Install Notcurses::Native via source-build path
        env:
          NOTCURSES_NATIVE_BUILD_FROM_SOURCE: '1'
        run: zef install --/test --force-install .

      - name: Run unit tests (prove6) — source-build path
        run: prove6 --verbose -I lib -I t/lib t

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      # ---------------------------------------------------------
      # Prebuilt path — no system deps installed yet.
      # ---------------------------------------------------------
      - name: Install Notcurses::Native via prebuilt path
        run: zef install --/test .

      - name: Install Raku test deps
        run: zef install --/test App::Prove6

      - name: Run unit tests (prove6) — prebuilt path
        run: prove6 --verbose -I lib -I t/lib t

      - name: Run extended tests (prove — terminal-dependent)
        run: prove -e 'raku -I lib -I t/lib' --verbose xt/*.rakutest

      # ---------------------------------------------------------
      # Source-build path — install system deps now.
      # ---------------------------------------------------------
      - name: Install system dependencies (for source-build fallback)
        run: |
          brew install \
            cmake \
            pkg-config \
            ffmpeg \
            ncurses \
            libunistring \
            libdeflate

      - name: Install Notcurses::Native via source-build path
        env:
          NOTCURSES_NATIVE_BUILD_FROM_SOURCE: '1'
        run: zef install --/test --force-install .

      - name: Run unit tests (prove6) — source-build path
        run: prove6 --verbose -I lib -I t/lib t

  test-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Rakudo first so msys2 (below) can inherit PATH including raku/zef.
      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      # MSYS2 in UCRT64 mode — produces native Windows DLLs/EXEs built
      # with mingw-w64 GCC. Per upstream notcurses docs this is the only
      # supported Windows build environment.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # Inherit the Windows PATH so Raku/setup-raku's rakudo + zef
          # are visible inside the msys2 shell. Without this the msys2
          # environment is sandboxed from the runner's PATH entries.
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-libunistring
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain

      # Upstream explicitly notes that notcurses-tester does not work on
      # Windows (see doc/notcurses.md, 'Microsoft Windows' section).
      # Our goal here is to prove the install + load path works — not to
      # run the full unit-test suite. A successful zef install (which
      # runs Build.rakumod, downloads the prebuilt, SHA-verifies it,
      # stages to %LOCALAPPDATA%) demonstrates the artifact is usable.
      - name: Verify zef can install the module (prebuilt path)
        run: zef install --/test .

      # Source-build pass: forces the CMake fallback so we catch
      # regressions in the Windows source-build branch too. MSYS2
      # toolchain + ffmpeg/ncurses/libdeflate/libunistring are
      # available from the setup-msys2 step above.
      - name: Verify zef can install the module (source-build path)
        env:
          NOTCURSES_NATIVE_BUILD_FROM_SOURCE: '1'
        run: zef install --/test --force-install .

# Build statically-linked (for ncurses/unistring/deflate) and
# sibling-bundled (for ffmpeg) notcurses binaries for every supported
# (OS, arch) pair and publish them as GitHub Release assets, so
# `zef install Notcurses::Native` can grab prebuilts instead of
# pulling a 5–15 minute CMake build from the user's machine.
#
# Each platform produces one archive (.tar.gz on Unix, .zip on
# Windows) containing the three notcurses libs (libnotcurses,
# libnotcurses-core, libnotcurses-ffi) plus the ffmpeg sibling
# dylibs they dyn-link. Relocations:
#   macOS:   install_name_tool via dylibbundler → @loader_path/
#   Linux:   patchelf --set-rpath '$ORIGIN'
#   Windows: sibling DLLs in the same directory (Windows loader
#            searches there first)
#
# Triggers:
#   - workflow_dispatch: manual run while iterating on the recipe.
#   - push: tags matching `binaries-*` for production releases.
#     BINARY_TAG file at repo root is the single source of truth
#     for which tag this release should produce.

name: build-binaries

on:
  workflow_dispatch:

  push:
    tags:
      - 'binaries-*'

permissions:
  contents: write

env:
  # Shared across all runners so the CMake flags stay consistent
  # with what Build.rakumod's compile-from-source fallback uses.
  # Keeping them in env rather than duplicating in each step.
  CMAKE_FLAGS: >-
    -DUSE_MULTIMEDIA=ffmpeg
    -DBUILD_FFI_LIBRARY=ON
    -DUSE_CXX=OFF
    -DBUILD_EXECUTABLES=OFF
    -DUSE_PANDOC=OFF
    -DUSE_DOCTEST=OFF
    -DUSE_POC=OFF
    -DUSE_STATIC=OFF
    -DCMAKE_BUILD_TYPE=Release

jobs:
  build-macos:
    name: build-macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          brew install cmake pkg-config ffmpeg ncurses libunistring libdeflate dylibbundler

      - name: Configure + build notcurses
        run: |
          set -euxo pipefail
          cd vendor/notcurses
          mkdir -p build

          # Homebrew ncurses isn't in the default pkg-config path.
          export PKG_CONFIG_PATH="$(brew --prefix)/opt/ncurses/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          cmake -B build -S . $CMAKE_FLAGS
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Stage + relocate libs
        run: |
          set -euxo pipefail
          mkdir -p bundle

          # Only stage the two ENTRY-POINT libs:
          #   - libnotcurses        (full, with multimedia)
          #   - libnotcurses-ffi    (static-inline C wrappers;
          #                          NOT a dep of libnotcurses)
          #
          # libnotcurses-core gets auto-copied into bundle/ by
          # dylibbundler as a dependency of libnotcurses. Pre-staging
          # it here would cause dylibbundler to try `cp bundle/x.dylib
          # bundle/x.dylib` and fail with "identical files not copied"
          # because dylibbundler doesn't recognise already-bundled deps.
          for lib in libnotcurses libnotcurses-ffi; do
            real=$(find vendor/notcurses/build -name "${lib}.*.dylib" -type f ! -type l | sort | tail -1)
            if [[ -z "$real" ]]; then
              echo "❌ Could not find real file for $lib"
              exit 1
            fi
            cp "$real" "bundle/$(basename "$real")"
          done

          # Run dylibbundler. -s points at the cmake build dir so
          # dylibbundler can resolve @rpath/libnotcurses-core.3.dylib
          # (a symlink in build/) and copy the real file into bundle/.
          # Both notcurses entry-points share the same ffmpeg tree, so
          # the second invocation mostly skips already-bundled deps.
          for lib in libnotcurses libnotcurses-ffi; do
            real_in_bundle=$(ls bundle/${lib}.*.*.dylib | head -1)
            dylibbundler -of -b -ns \
              -x "$real_in_bundle" \
              -s vendor/notcurses/build \
              -d bundle/ \
              -p '@loader_path/'
          done

          # Create SONAME + unversioned symlinks AFTER dylibbundler
          # finishes, for each of the three notcurses libs now in
          # bundle/. NativeCall looks up the unversioned name
          # (libnotcurses.dylib) via %?RESOURCES; dylibbundler's
          # rewritten refs look for the SONAME-style name
          # (libnotcurses-core.3.dylib). Both resolve to the real
          # versioned file via these symlinks.
          cd bundle
          for lib in libnotcurses libnotcurses-core libnotcurses-ffi; do
            real=$(ls ${lib}.*.*.dylib 2>/dev/null | head -1)
            if [[ -z "$real" ]]; then
              echo "⚠️  No real file for $lib in bundle/ — dylibbundler may have used a different name."
              ls ${lib}* 2>/dev/null || true
              exit 1
            fi
            major=$(echo "$real" | sed -E "s|^${lib}\.([0-9]+)\..*|\1|")
            ln -sf "$real" "${lib}.${major}.dylib"
            ln -sf "$real" "${lib}.dylib"
          done
          cd ..

          # Strip debug symbols from every real dylib we ship (skip symlinks).
          find bundle -name '*.dylib' -type f ! -type l -exec strip -x {} \; 2>/dev/null || true

          echo "--- bundle contents ---"
          ls -la bundle/
          echo "--- otool dump (libnotcurses) ---"
          otool -L bundle/libnotcurses.dylib

      - name: Package archive
        id: pkg
        run: |
          set -euxo pipefail
          artifact="notcurses-macos-arm64.tar.gz"
          tar -czf "$artifact" -C bundle .
          shasum -a 256 "$artifact" | tee "${artifact}.sha256"
          mkdir -p artefacts
          mv "$artifact" "${artifact}.sha256" artefacts/

      - uses: actions/upload-artifact@v4
        with:
          name: notcurses-macos-arm64
          path: artefacts/
          retention-days: 14

  build-linux:
    name: build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64-glibc
          - os: ubuntu-22.04-arm
            platform: linux-aarch64-glibc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config patchelf \
            libncurses-dev libunistring-dev libdeflate-dev \
            libavformat-dev libavcodec-dev libavdevice-dev \
            libavutil-dev libswscale-dev

      - name: Configure + build notcurses
        run: |
          set -euxo pipefail
          cd vendor/notcurses
          mkdir -p build
          cmake -B build -S . $CMAKE_FLAGS
          cmake --build build -j"$(nproc)"

      - name: Stage + relocate libs
        run: |
          set -euxo pipefail
          mkdir -p bundle
          cd vendor/notcurses/build

          for lib in libnotcurses libnotcurses-core libnotcurses-ffi; do
            found=$(find . -name "${lib}.so.*" -type f | sort | tail -1)
            [[ -z "$found" ]] && found=$(find . -name "${lib}.so" -type f | head -1)
            cp "$found" "../../../bundle/${lib}.so"
          done

          cd ../../..

          # Bundle ffmpeg siblings + their transitive deps. Recursive
          # ldd walk — each new lib we copy into bundle/ gets its own
          # deps inspected until closure. Skip the system baseline
          # (libc, libm, libpthread, libdl, librt, libstdc++,
          # ld-linux, libgcc_s, libresolv) — those must stay dynamic
          # to avoid crt clashes.
          is_system_lib() {
            case "$1" in
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*| \
              librt.so.*|libstdc++.so.*|ld-linux*|libgcc_s.so.*| \
              libresolv.so.*|libnsl.so.*|linux-vdso.so.*| \
              libutil.so.*|libcrypt.so.*)
                return 0 ;;
              *) return 1 ;;
            esac
          }

          process_deps() {
            local lib="$1"
            # Same space-safe + absolute-path parser as the Windows
            # job (see comment there). Strips any `(...)` trailing
            # marker from ldd output and skips non-absolute paths
            # (catches `not found`, bare filenames, etc.).
            ldd "$lib" 2>/dev/null \
              | sed -n 's/ (.*)$//; s/^[[:space:]]*\([^ ]\+\) => \(.\+\)$/\1\t\2/p' \
              | while IFS=$'\t' read -r name path; do
                  is_system_lib "$name" && continue
                  [[ -z "$path" ]] && continue
                  [[ "$path" != /* && "$path" != ?:[/\\]* ]] && continue
                  if [[ ! -f "bundle/$name" ]]; then
                    cp "$path" "bundle/$name"
                    echo "Bundled: $name  (from $path)"
                    process_deps "bundle/$name"  # recurse
                  fi
                done
          }

          for lib in bundle/libnotcurses.so bundle/libnotcurses-core.so bundle/libnotcurses-ffi.so; do
            process_deps "$lib"
          done

          # Set rpath to $ORIGIN on every shipped .so so they find
          # siblings in their own directory at load time.
          find bundle -name '*.so*' -type f | while read f; do
            patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
          done

          find bundle -name '*.so*' -type f -exec strip --strip-unneeded {} \; 2>/dev/null || true

          echo "--- bundle contents ---"
          ls -la bundle/
          echo "--- ldd libnotcurses.so ---"
          ldd bundle/libnotcurses.so || true

      - name: Package archive
        run: |
          set -euxo pipefail
          artifact="notcurses-${{ matrix.platform }}.tar.gz"
          tar -czf "$artifact" -C bundle .
          sha256sum "$artifact" | tee "${artifact}.sha256"
          mkdir -p artefacts
          mv "$artifact" "${artifact}.sha256" artefacts/

      - uses: actions/upload-artifact@v4
        with:
          name: notcurses-${{ matrix.platform }}
          path: artefacts/
          retention-days: 14

  build-windows:
    name: build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows-x86_64
            msystem: UCRT64
            pkg-prefix: ucrt-x86_64
          - os: windows-11-arm
            platform: windows-arm64
            msystem: CLANGARM64
            pkg-prefix: clang-aarch64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          path-type: inherit
          # Restore MSYS2 install state between runs — first run
          # still pays the big download (~6 GB for UCRT64 x86_64,
          # ~9 GB for CLANGARM64 — most of it ffmpeg's codec tree +
          # the toolchain). Retries hit cache and finish in seconds.
          # Cache is keyed per-msystem + install list, so changes
          # to the package list correctly invalidate it, and the
          # two matrix entries don't step on each other's caches.
          cache: true
          install: >-
            zip
            mingw-w64-${{ matrix.pkg-prefix }}-cmake
            mingw-w64-${{ matrix.pkg-prefix }}-ninja
            mingw-w64-${{ matrix.pkg-prefix }}-toolchain
            mingw-w64-${{ matrix.pkg-prefix }}-ffmpeg
            mingw-w64-${{ matrix.pkg-prefix }}-libdeflate
            mingw-w64-${{ matrix.pkg-prefix }}-libunistring
            mingw-w64-${{ matrix.pkg-prefix }}-ncurses
            mingw-w64-${{ matrix.pkg-prefix }}-pkgconf

      - name: Configure + build notcurses
        run: |
          set -euxo pipefail
          cd vendor/notcurses
          mkdir -p build
          cmake -B build -S . -G Ninja $CMAKE_FLAGS

          # Fail loudly if cmake silently downgraded USE_MULTIMEDIA=ffmpeg
          # to none — that'd produce a stripped notcurses with no image
          # support, defeating half the point of shipping it.
          if ! grep -q 'USE_MULTIMEDIA:STRING=ffmpeg' build/CMakeCache.txt; then
            echo "❌ USE_MULTIMEDIA did not land as 'ffmpeg' in CMakeCache."
            echo "--- relevant cache entries ---"
            grep -E '(USE_MULTIMEDIA|FFMPEG|AVCODEC)' build/CMakeCache.txt || true
            exit 1
          fi

          ninja -C build

      - name: Stage + bundle sibling DLLs
        run: |
          set -euxo pipefail
          mkdir -p bundle
          cd vendor/notcurses/build

          # MinGW DLL naming varies: libfoo-N.dll, libfoo.dll, foo.dll.
          # BUT: `notcurses` is a prefix of `notcurses-core` and
          # `notcurses-ffi`, so a loose *notcurses*.dll glob matches
          # all three and head -1 picks the same file every iteration.
          # Restrict: only allow `.` or `-<digits>` after the name.
          for lib in notcurses notcurses-core notcurses-ffi; do
            found=$(find . -type f \( \
                -iname "${lib}.dll" -o \
                -iname "lib${lib}.dll" -o \
                -iname "${lib}-[0-9]*.dll" -o \
                -iname "lib${lib}-[0-9]*.dll" \
              \) | head -1)
            if [[ -z "$found" ]]; then
              echo "❌ Could not locate built DLL for $lib"
              find . -iname "*${lib}*" -type f
              exit 1
            fi
            cp "$found" "../../../bundle/lib${lib}.dll"
            echo "Staged lib${lib}.dll (from $(basename $found))"
          done

          cd ../../..

          # On Windows, DLL search order finds siblings in the same
          # directory as the DLL being loaded — no rpath needed.
          # We just need to ensure every transitive dep is present
          # in bundle/. MSYS2's `ldd` works on Windows DLLs.
          #
          # Filter by PATH not by name: anything under C:\Windows\ is
          # a system DLL shipped with Windows itself and must stay
          # dynamic (bundling them would crash on newer Windows).
          # Also skip MSVC/UCRT runtime DLLs — these are always
          # available on any Windows machine modern enough to run
          # Rakudo.
          is_system_dll() {
            local name="$1"
            local path="$2"
            # Name-based skip: Windows API Set forwarders are ALWAYS
            # system DLLs and ALWAYS present on any supported Windows
            # version. ldd on ARM64 sometimes reports their paths
            # truncated or pointing at a directory; the name match
            # catches them regardless of what ldd says.
            case "${name,,}" in
              api-ms-*|ext-ms-*|ms-win-*)
                return 0 ;;
            esac
            # Path-based skip: anything under C:\Windows is a system
            # DLL and must stay dynamic.
            local lc="${path,,}"
            case "$lc" in
              /c/windows/*|c:/windows/*|c:\\windows\\*)
                return 0 ;;
            esac
            return 1
          }

          # Fallback: search known msystem bin dirs by name when ldd
          # gives us a bogus path. CLANGARM64's ldd is unreliable —
          # often reports directories or partial paths instead of
          # the actual DLL location. Silently skipping those would
          # lose ~100 legit ffmpeg codec / text-rendering DLLs.
          find_dll_by_name() {
            local name="$1"
            for search in /clangarm64/bin /ucrt64/bin /mingw64/bin /usr/bin; do
              if [[ -f "$search/$name" ]]; then
                echo "$search/$name"
                return 0
              fi
            done
            return 1
          }

          process_deps() {
            local dll="$1"
            # ldd output examples across platforms:
            #   name => /c/Program Files/.../foo.dll (0x...)     MSYS2 UCRT64
            #   name => /clangarm64/bin/avcodec-62.dll (?)       MSYS2 CLANGARM64 (good)
            #   name => /c/Program Files (?)                     CLANGARM64 (bad, truncated)
            #   name => not found                                dep missing
            ldd "$dll" 2>/dev/null \
              | sed -n 's/ (.*)$//; s/^[[:space:]]*\([^ ]\+\) => \(.\+\)$/\1\t\2/p' \
              | while IFS=$'\t' read -r name path; do
                  [[ -z "$path" ]] && continue
                  if is_system_dll "$name" "$path"; then
                    continue
                  fi
                  # If ldd's resolved path isn't a real file (ARM64
                  # often reports garbled paths), fall back to
                  # searching by name in known msystem bin dirs.
                  if [[ ! -f "$path" ]]; then
                    if resolved=$(find_dll_by_name "$name"); then
                      path="$resolved"
                      echo "Resolved $name via fallback: $path"
                    else
                      echo "Skipping $name: unresolvable (ldd path='$path', not in known bin dirs)"
                      continue
                    fi
                  fi
                  if [[ ! -f "bundle/$name" ]]; then
                    cp "$path" "bundle/$name"
                    echo "Bundled: $name  (from $path)"
                    process_deps "bundle/$name"
                  fi
                done
          }

          for dll in bundle/libnotcurses.dll bundle/libnotcurses-core.dll bundle/libnotcurses-ffi.dll; do
            process_deps "$dll"
          done

          # Belt-and-braces sweep: some msystem variants (notably
          # CLANGARM64) have ldd failures that cause ffmpeg's codec
          # + text-rendering deps to be silently missed. If the DLLs
          # exist in the msystem bin dir, copy them anyway —
          # can't hurt (they're already dynamic deps somewhere in
          # the graph), and catches the cases where ldd lies.
          # Process each copied lib through process_deps for its own
          # transitive deps.
          echo "--- belt-and-braces sweep ---"
          for name in \
              libncursesw6.dll libncurses6.dll \
              libunistring-5.dll libunistring-2.dll \
              libdeflate.dll \
              libpng16-16.dll libjpeg-8.dll libwebp-7.dll libwebpmux-3.dll \
              libsharpyuv-0.dll libgif-7.dll libtiff-6.dll \
              libiconv-2.dll libintl-8.dll \
              libstdc++-6.dll libgcc_s_seh-1.dll libgcc_s_1.dll \
              libssp-0.dll libgomp-1.dll \
              zlib1.dll liblzma-5.dll libbz2-1.dll \
              libexpat-1.dll libxml2-16.dll libxml2-2.dll \
              libx264-165.dll libx265-215.dll libvpx-1.dll libdav1d-7.dll \
              libSvtAv1Enc-4.dll libopus-0.dll libmp3lame-0.dll \
              libvorbis-0.dll libvorbisenc-2.dll libogg-0.dll \
              libfreetype-6.dll libfontconfig-1.dll \
              libharfbuzz-0.dll libgraphite2.dll \
              libbrotlidec.dll libbrotlicommon.dll \
              swresample-6.dll \
              libopenjp2-7.dll \
          ; do
            if [[ ! -f "bundle/$name" ]]; then
              if resolved=$(find_dll_by_name "$name"); then
                cp "$resolved" "bundle/$name"
                echo "Swept in: $name  (from $resolved)"
                process_deps "bundle/$name"
              fi
              # If not found, silently skip — this variant's ffmpeg
              # simply doesn't ship it, either statically baked in
              # or unsupported on this platform.
            fi
          done

          echo "--- bundle contents ---"
          ls -la bundle/

      # No `shell: bash` here — we want the job-level msys2 default
      # because Git Bash's PATH doesn't include the `zip` utility
      # we pacman-installed into /usr/bin. The MSYS2 shell does.
      - name: Package archive
        run: |
          set -euxo pipefail
          artifact="notcurses-${{ matrix.platform }}.zip"
          (cd bundle && zip -r "../$artifact" .)
          sha256sum "$artifact" | tee "${artifact}.sha256"
          mkdir -p artefacts
          mv "$artifact" "${artifact}.sha256" artefacts/

      - uses: actions/upload-artifact@v4
        with:
          name: notcurses-${{ matrix.platform }}
          path: artefacts/
          retention-days: 14

  release:
    name: release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/binaries-') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded/

      - name: Flatten + generate combined checksums.txt + resolve tag
        id: prep
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release
          find downloaded -type f \( -name 'notcurses-*.tar.gz' \
                                 -o -name 'notcurses-*.zip'   \) \
            -exec cp {} release/ \;

          cd release
          sha256sum * | sort > ../checksums.txt
          cd ..
          echo "--- checksums.txt ---"
          cat checksums.txt

          file_tag=$(cat BINARY_TAG | tr -d '[:space:]')
          if [[ -z "$file_tag" ]]; then
            echo "❌ BINARY_TAG empty / missing."
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            pushed=${GITHUB_REF#refs/tags/}
            if [[ "$pushed" != "$file_tag" ]]; then
              echo "❌ Pushed tag '$pushed' doesn't match BINARY_TAG '$file_tag'."
              exit 1
            fi
          fi

          echo "tag=$file_tag" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          name: ${{ steps.prep.outputs.tag }}
          files: |
            release/*
            checksums.txt
          body: |
            Prebuilt notcurses binaries for `${{ steps.prep.outputs.tag }}`.

            Each archive contains `libnotcurses`, `libnotcurses-core`,
            `libnotcurses-ffi`, plus ffmpeg sibling dylibs that
            notcurses dyn-links — all with rpaths relocated so they
            load siblings from the archive's own directory.

            ## Verifying

            ```
            sha256sum -c checksums.txt
            ```

            ## After release

            Copy `checksums.txt` contents into `resources/checksums.txt`
            in the source tree + commit, then publish the next Raku
            dist version.
          draft: false
          prerelease: false
